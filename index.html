<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Mã Số Thuế Doanh Nghiệp</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Tối ưu thanh cuộn */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Hiệu ứng nảy từ phía dưới lên */
        @keyframes slideUp {
            0% {
                transform: translate(-50%, 2rem);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-start items-center py-4 px-3 sm:px-4 lg:px-6">

    <!-- Main Content Container -->
    <main class="w-full max-w-4xl">
        
        <!-- Search Section -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 sm:p-5 mb-4">
            <!-- Horizontal Search Box -->
            <form id="searchForm" class="flex flex-col sm:flex-row gap-2.5">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="mstInput" 
                        placeholder="Nhập mã số thuế để tra cứu nhanh..." 
                        required
                        class="block w-full pl-10 pr-10 py-3 border border-slate-300 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm sm:text-base shadow-sm transition duration-150"
                    />
                    <!-- Button to clear input -->
                    <button 
                        type="button" 
                        id="clearMstBtn" 
                        class="hidden absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition"
                        title="Xóa mã số thuế"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <button 
                    type="submit" 
                    class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-sm sm:text-base font-bold rounded-xl text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-md shadow-brand-100 hover:shadow-lg transition duration-150 whitespace-nowrap"
                >
                    <span id="btnText">Tra cứu ngay</span>
                    <svg id="btnSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Notification system (Fixed Bottom Toast - Nảy từ dưới lên, Chữ ở giữa khung) -->
        <div id="toast" class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 z-50 max-w-md w-[calc(100%-2rem)] sm:w-96 p-3 rounded-xl border flex flex-col items-center justify-center text-center shadow-xl transition-all duration-300 animate-slide-up bg-white">
            <div class="flex items-center justify-center space-x-2">
                <div id="toastIcon" class="flex-shrink-0"></div>
                <p id="toastMessage" class="text-sm font-semibold tracking-wide"></p>
            </div>
        </div>

        <!-- Result / Block Grid Container -->
        <div id="resultsWrapper" class="w-full">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6 p-4">
                <!-- Styled Blocks with Borders and Spacing (Khoảng cách & Khung viền - Đúng 5 trường yêu cầu) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    
                    <!-- 1. Tên chính thức (Full Width Card) -->
                    <div class="md:col-span-2 bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow transition duration-200">
                        <div class="flex items-center space-x-2 mb-0.5">
                            <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md text-xs font-semibold">Tên chính thức</span>
                        </div>
                        <div class="text-base sm:text-lg font-bold text-slate-900 leading-snug" id="colTenDN">-</div>
                    </div>

                    <!-- 2. Mã số thuế -->
                    <div class="bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow transition duration-200">
                        <div class="flex items-center justify-between mb-0.5">
                            <span class="bg-purple-50 text-purple-600 px-2 py-0.5 rounded-md text-xs font-semibold">Mã số thuế</span>
                            <button onclick="copyText('colMST')" class="text-slate-400 hover:text-brand-600 p-1 rounded hover:bg-slate-50 transition" title="Sao chép">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                        <div class="text-base font-mono font-extrabold text-slate-800 leading-none" id="colMST">-</div>
                    </div>

                    <!-- 3. Tình trạng hoạt động -->
                    <div class="bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow transition duration-200">
                        <div class="flex items-center space-x-2 mb-0.5">
                            <span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-md text-xs font-semibold">Tình trạng hoạt động</span>
                        </div>
                        <div class="text-base font-semibold leading-tight text-slate-800" id="colTinhTrang">-</div>
                    </div>

                    <!-- 4. Địa chỉ đăng ký thuế (Full Width Card) -->
                    <div class="md:col-span-2 bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow transition duration-200">
                        <div class="flex items-center justify-between mb-0.5">
                            <span class="bg-amber-50 text-amber-600 px-2 py-0.5 rounded-md text-xs font-semibold">Địa chỉ đăng ký thuế</span>
                            <button onclick="copyText('colDiaChiThue')" class="text-slate-400 hover:text-brand-600 p-1 rounded hover:bg-slate-50 transition" title="Sao chép địa chỉ">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                        <div class="text-sm sm:text-base text-slate-700 leading-relaxed" id="colDiaChiThue">-</div>
                    </div>

                    <!-- 5. Cơ quan thuế quản lý (Full Width Card) -->
                    <div class="md:col-span-2 bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow transition duration-200">
                        <div class="flex items-center space-x-2 mb-0.5">
                            <span class="bg-orange-50 text-orange-600 px-2 py-0.5 rounded-md text-xs font-semibold">Cơ quan thuế quản lý</span>
                        </div>
                        <div class="text-sm sm:text-base text-slate-700 leading-relaxed" id="colQuanLyBoi">-</div>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <!-- Script Section -->
    <script>
        const apiKey = "";

        // Premium Local Cache to avoid API delays for well-known enterprise codes
        const localCache = {
            "0101245483": {
                tenDoanhNghiep: "TẬP ĐOÀN VINGROUP - CÔNG TY CP",
                maSoThue: "0101245483",
                diaChiThue: "Số 7 đường Bằng Lăng 1, Khu đô thị sinh thái Vinhomes Riverside, Phường Việt Hưng, Quận Long Biên, Thành phố Hà Nội, Việt Nam",
                tinhTrang: "Đang hoạt động (đã được cấp MST)",
                quanLyBoi: "Cục Thuế Thành phố Hà Nội"
            },
            "0100109106": {
                tenDoanhNghiep: "TẬP ĐOÀN CÔNG NGHIỆP - VIỄN THÔNG QUÂN ĐỘI",
                maSoThue: "0100109106",
                diaChiThue: "Lô D26, Khu đô thị mới Cầu Giấy, Phường Yên Hòa, Quận Cầu Giấy, Thành phố Hà Nội, Việt Nam",
                tinhTrang: "Đang hoạt động (đã được cấp MST)",
                quanLyBoi: "Cục Thuế Thành phố Hà Nội"
            },
            "0100277401": {
                tenDoanhNghiep: "CÔNG TY CỔ PHẦN FPT",
                maSoThue: "0100277401",
                diaChiThue: "Số 10 phố Phạm Văn Bạch, Phường Dịch Vọng, Quận Cầu Giấy, Thành phố Hà Nội, Việt Nam",
                tinhTrang: "Đang hoạt động (đã được cấp MST)",
                quanLyBoi: "Cục Thuế Thành phố Hà Nội"
            },
            "0100112437": {
                tenDoanhNghiep: "NGÂN HÀNG THƯƠNG MẠI CỔ PHẦN NGOẠI THƯƠNG VIỆT NAM",
                maSoThue: "0100112437",
                diaChiThue: "198 Trần Quang Khải, Phường Lý Thái Tổ, Quận Hoàn Kiếm, Thành phố Hà Nội, Việt Nam",
                tinhTrang: "Đang hoạt động (đã được cấp MST)",
                quanLyBoi: "Cục Thuế Thành phố Hà Nội"
            }
        };

        // DOM elements
        const searchForm = document.getElementById('searchForm');
        const mstInput = document.getElementById('mstInput');
        const clearMstBtn = document.getElementById('clearMstBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const resultsWrapper = document.getElementById('resultsWrapper');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');

        // Manage Input clear button state
        mstInput.addEventListener('input', () => {
            if (mstInput.value.trim().length > 0) {
                clearMstBtn.classList.remove('hidden');
            } else {
                clearMstBtn.classList.add('hidden');
            }
        });

        clearMstBtn.addEventListener('click', () => {
            mstInput.value = '';
            clearMstBtn.classList.add('hidden');
            mstInput.focus();
        });

        // Universal handler to communicate with Gemini 2.5 Flash API with timeout abort support
        async function callGeminiAPI(prompt, systemInstruction, timeoutMs = 8000) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                tools: [{ google_search: {} }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error("API response error");
                const json = await response.json();
                const text = json.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    return JSON.parse(text);
                }
            } catch (err) {
                clearTimeout(timeoutId);
                throw err;
            }
            return null;
        }

        // Fetch primary data (Tên, Địa chỉ) exclusively from masothue.com
        async function fetchPrimaryData(mst) {
            if (localCache[mst]) {
                return {
                    tenDoanhNghiep: localCache[mst].tenDoanhNghiep,
                    diaChiThue: localCache[mst].diaChiThue
                };
            }

            try {
                const sysInst = "Bạn là trợ lý tra cứu mã số thuế doanh nghiệp chuyên nghiệp. Nhiệm vụ của bạn là lấy chính xác Tên và Địa chỉ đăng ký thuế ứng với mã số thuế tại trang https://masothue.com/.";
                const prompt = `Thực hiện tìm kiếm Google Search cho từ khóa: 'site:masothue.com "${mst}"'. Trích xuất dữ liệu trả về JSON: {"tenDoanhNghiep": "TÊN DOANH NGHIỆP VIẾT HOA", "diaChiThue": "Địa chỉ đăng ký thuế chính xác"}`;
                
                const data = await callGeminiAPI(prompt, sysInst, 8000); 
                if (data && data.tenDoanhNghiep) {
                    return data;
                }
            } catch (err) {
                console.error("Failed to fetch from masothue.com:", err);
            }
            return null;
        }

        // Fetch secondary data (Tình trạng, Cơ quan quản lý) exclusively from thongtincongty.vn
        async function fetchSecondaryData(mst) {
            if (localCache[mst]) {
                return {
                    tinhTrang: localCache[mst].tinhTrang,
                    quanLyBoi: localCache[mst].quanLyBoi
                };
            }

            try {
                const sysInst = "Bạn là trợ lý tra cứu thông tin thuế doanh nghiệp. Nhiệm vụ của bạn là tìm thông tin Tình trạng hoạt động và Cơ quan quản lý thuế ứng với mã số thuế tại trang https://thongtincongty.vn/.";
                const prompt = `Thực hiện tìm kiếm Google Search cho từ khóa: 'site:thongtincongty.vn "${mst}"'. Trích xuất dữ liệu trả về JSON: {"tinhTrang": "Tình trạng hoạt động hiện tại", "quanLyBoi": "Cơ quan thuế quản lý trực tiếp"}`;
                
                const data = await callGeminiAPI(prompt, sysInst, 8000); 
                if (data && (data.tinhTrang || data.quanLyBoi)) {
                    return data;
                }
            } catch (err) {
                console.error("Failed to fetch from thongtincongty.vn:", err);
            }
            return null;
        }

        // Form Submit Handler
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const mstVal = mstInput.value.trim().replace(/\s/g, '');
            if (!mstVal) {
                showToast("Vui lòng nhập mã số thuế hợp lệ.", "error");
                return;
            }

            setLoading(true);
            closeToast();

            // Set temporary loading states to existing fields
            initializePlaceholderStates(mstVal);

            // Progressive Hydration
            const primaryPromise = fetchPrimaryData(mstVal);
            const secondaryPromise = fetchSecondaryData(mstVal);

            // Render primary data as soon as it resolves
            primaryPromise.then(primaryResult => {
                if (primaryResult) {
                    renderPrimaryData(primaryResult);
                } else {
                    handlePrimaryError();
                }
            }).catch(err => {
                console.error("Primary fetch failed:", err);
                handlePrimaryError();
            });

            // Render secondary data as soon as it resolves
            secondaryPromise.then(secondaryResult => {
                if (secondaryResult) {
                    renderSecondaryData(secondaryResult);
                } else {
                    handleSecondaryError();
                }
            }).catch(err => {
                console.error("Secondary fetch failed:", err);
                handleSecondaryError();
            });

            // Wait for both to finalize loading indicator
            try {
                const [pRes, sRes] = await Promise.all([primaryPromise, secondaryPromise]);
                if (pRes || sRes) {
                    showToast("Tra cứu thành công", "success");
                } else {
                    showToast("Không tìm thấy dữ liệu trên các cổng thông tin.", "error");
                }
            } catch (err) {
                console.warn("Parallel fetch execution error occurred:", err);
            } finally {
                setLoading(false);
            }
        });

        // Setup placeholder animation states
        function initializePlaceholderStates(mst) {
            const fields = ['colTenDN', 'colDiaChiThue', 'colTinhTrang', 'colQuanLyBoi'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                el.textContent = "Đang đồng bộ...";
                el.className = "animate-pulse text-slate-400 font-medium";
            });
            document.getElementById('colMST').textContent = mst;
        }

        // Render Primary Web Data
        function renderPrimaryData(data) {
            const elTen = document.getElementById('colTenDN');
            elTen.textContent = data.tenDoanhNghiep || "Không tìm thấy";
            elTen.className = "text-base sm:text-lg font-bold text-slate-900 leading-snug";

            const elDiaChi = document.getElementById('colDiaChiThue');
            elDiaChi.textContent = data.diaChiThue || "Không tìm thấy";
            elDiaChi.className = "text-sm sm:text-base text-slate-700 leading-relaxed";
        }

        // Render Secondary Web Data
        function renderSecondaryData(data) {
            const elTinhTrang = document.getElementById('colTinhTrang');
            elTinhTrang.textContent = data.tinhTrang || "Không tìm thấy hoặc chưa cập nhật";
            elTinhTrang.className = "text-base font-semibold leading-tight text-slate-800";

            const elQuanLy = document.getElementById('colQuanLyBoi');
            elQuanLy.textContent = data.quanLyBoi || "Không tìm thấy hoặc chưa cập nhật";
            elQuanLy.className = "text-sm sm:text-base text-slate-700 leading-relaxed";
        }

        // Handle errors elegantly
        function handlePrimaryError() {
            const elTen = document.getElementById('colTenDN');
            elTen.textContent = "Không tìm thấy thông tin cơ bản";
            elTen.className = "text-base font-semibold text-rose-500";

            const elDiaChi = document.getElementById('colDiaChiThue');
            elDiaChi.textContent = "Không thể kết nối đến máy chủ masothue.com";
            elDiaChi.className = "text-sm text-slate-400";
        }

        function handleSecondaryError() {
            const elTinhTrang = document.getElementById('colTinhTrang');
            elTinhTrang.textContent = "Không thể lấy thông tin trạng thái";
            elTinhTrang.className = "text-sm text-slate-400";

            const elQuanLy = document.getElementById('colQuanLyBoi');
            elQuanLy.textContent = "Không thể kết nối thongtincongty.vn";
            elQuanLy.className = "text-sm text-slate-400";
        }

        // Clear loading animations if error occurs
        function resetFieldStates() {
            const fields = ['colTenDN', 'colDiaChiThue', 'colTinhTrang', 'colQuanLyBoi'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                el.className = "";
                el.textContent = "-";
            });
        }

        // Control Spinner / Search Button State
        function setLoading(isLoading) {
            if (isLoading) {
                btnText.textContent = "Đang tra cứu...";
                btnSpinner.classList.remove('hidden');
                mstInput.disabled = true;
            } else {
                btnText.textContent = "Tra cứu ngay";
                btnSpinner.classList.add('hidden');
                mstInput.disabled = false;
            }
        }

        // Custom Toast Notifications (Slide up, centered, disappears after 1.5s)
        function showToast(message, type) {
            toast.classList.remove('hidden');
            toastMessage.textContent = message;

            // Reset class list to default for clean animation & styles
            toast.className = "fixed bottom-5 left-1/2 z-50 max-w-md w-[calc(100%-2rem)] sm:w-96 p-3 rounded-xl border flex flex-col items-center justify-center text-center shadow-xl transition-all duration-300 animate-slide-up bg-white";

            if (type === 'success') {
                toast.className += " border-emerald-200 bg-emerald-50 text-emerald-800";
                toastIcon.innerHTML = `
                    <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                `;
            } else {
                toast.className += " border-rose-200 bg-rose-50 text-rose-800";
                toastIcon.innerHTML = `
                    <svg class="w-5 h-5 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                `;
            }

            // Tự động đóng sau 1.5 giây (1500ms)
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                closeToast();
            }, 1500);
        }

        function closeToast() {
            toast.classList.add('hidden');
        }

        // Copy dynamic text to clipboard
        function copyText(elementId) {
            const valText = document.getElementById(elementId).textContent;
            executeCopy(valText, `Đã sao chép: ${valText}`);
        }

        // Execute Copy with legacy document.execCommand support for Sandbox Iframes
        function executeCopy(text, successMsg) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast(successMsg, "success");
                } else {
                    showToast("Sao chép thất bại.", "error");
                }
            } catch (err) {
                showToast("Không thể sao chép dữ liệu.", "error");
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
